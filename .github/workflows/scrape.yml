name: Wix Static Site Scraper

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: "URL of the Wix site to scrape (e.g. https://myname.wixsite.com/mysite)"
        required: true
        type: string
      max_pages:
        description: "Max number of pages to crawl"
        required: false
        default: "200"
        type: string
      wait_ms:
        description: "Extra wait (ms) per page for JS to render (increase for slow sites)"
        required: false
        default: "2000"
        type: string

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  scrape:
    name: Crawl & Save Static Site
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup ──────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 3. Install Chrome (מטפל בכל התלויות אוטומטית) ────────────────────
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # ── 4. Install npm packages ────────────────────────────────────────────
      - name: Install dependencies
        run: npm install
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true

      # ── 5. Run the crawler ────────────────────────────────────────────────
      - name: Crawl site
        env:
          SITE_URL: ${{ github.event.inputs.site_url || vars.SITE_URL }}
          OUTPUT_DIR: ./static-output
          MAX_PAGES: ${{ github.event.inputs.max_pages || '200' }}
          WAIT_MS: ${{ github.event.inputs.wait_ms || '2000' }}
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
        run: npm run crawl

      # ── 6. Show summary ───────────────────────────────────────────────────
      - name: Print output summary
        run: |
          echo "## Scraped files" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find ./static-output -type f | head -100 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "**Total files:** $(find ./static-output -type f | wc -l)" >> $GITHUB_STEP_SUMMARY

      # ── 7. Upload artifact (download as ZIP from Actions tab) ─────────────
      - name: Upload static site as artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-site-${{ github.run_id }}
          path: ./static-output/
          retention-days: 30

      # ── 8. Upload to GitHub Pages ─────────────────────────────────────────
      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./static-output/

  # ── 9. Deploy to GitHub Pages ─────────────────────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
