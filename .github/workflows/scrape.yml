name: Wix Static Site Scraper

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: "URL של האתר (e.g. https://myname.wixsite.com/mysite)"
        required: true
        type: string
      max_pages:
        description: "מקסימום עמודים"
        required: false
        default: "200"
        type: string
      wait_ms:
        description: "המתנה per page בms (הגדל לאתרים איטיים)"
        required: false
        default: "4000"
        type: string

permissions:
  contents: read

jobs:
  scrape:
    name: Crawl & Save Offline Site
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: npm install
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true

      - name: Crawl site
        env:
          SITE_URL: ${{ github.event.inputs.site_url || vars.SITE_URL }}
          OUTPUT_DIR: ./static-output
          MAX_PAGES: ${{ github.event.inputs.max_pages || '200' }}
          WAIT_MS: ${{ github.event.inputs.wait_ms || '4000' }}
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
        run: npm run crawl

      - name: Show results
        if: always()
        run: |
          echo "## קבצים שנשמרו" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find ./static-output -type f -name "*.html" | sort >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "**סה״כ:** $(find ./static-output -type f 2>/dev/null | wc -l) קבצים" >> $GITHUB_STEP_SUMMARY

      - name: Upload ZIP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: offline-site-${{ github.run_id }}
          path: ./static-output/
          retention-days: 30
