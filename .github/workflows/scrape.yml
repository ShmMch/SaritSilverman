name: Wix Offline Site Builder

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: "URL מלא של האתר (e.g. https://myname.wixsite.com/mysite)"
        required: true
        type: string
      primary_folder:
        description: "שם התיקייה אחרי wixsite.com (e.g. mysite)"
        required: true
        type: string
      wait_seconds:
        description: "שניות המתנה בין דפים (3-6)"
        required: false
        default: "4"
        type: string

permissions:
  contents: read

jobs:
  scrape:
    name: Build Offline Site
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Python dependencies
        run: |
          pip3 install pyppeteer requests Pillow --break-system-packages

      - name: Download WixScraper and patch for Linux/CI
        run: |
          curl -o wixscraper_orig.py https://raw.githubusercontent.com/ryanhlewis/WixScraper/main/wixscraper.py
          # תקן את ה-launch() לעבוד על Linux headless ב-CI
          sed 's|browser = await launch(headless=False.*)|browser = await launch(headless=True, executablePath="/usr/bin/google-chrome-stable", args=["--no-sandbox","--disable-setuid-sandbox","--disable-dev-shm-usage","--window-size=1920,1080"], defaultViewport=None)|' wixscraper_orig.py > wixscraper.py
          echo "Patched launch() line:"
          grep "browser = await launch" wixscraper.py

      - name: Build config.json
        run: |
          cat > config.json << CONF
          {
            "site": "${{ github.event.inputs.site_url }}",
            "blockPrimaryFolder": "${{ github.event.inputs.primary_folder }}",
            "wait": ${{ github.event.inputs.wait_seconds }},
            "recursive": "True",
            "darkWebsite": "False",
            "forceDownloadAgain": "False",
            "metatags": {},
            "mapData": {}
          }
          CONF
          cat config.json

      - name: Run WixScraper
        run: python3 wixscraper.py

      - name: Show results
        if: always()
        run: |
          echo "## קבצים שנשמרו" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find . -path './.git' -prune -o -type f -print | grep -v "wixscraper\|config.json\|\.yml" | sort >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "**סה״כ:** $(find . -path './.git' -prune -o -type f -print | grep -v "\.git" | wc -l) קבצים" >> $GITHUB_STEP_SUMMARY

      - name: Upload ZIP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: offline-site-${{ github.run_id }}
          path: ./${{ github.event.inputs.primary_folder }}/
          retention-days: 30
