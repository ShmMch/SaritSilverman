name: Wix Static Site Scraper

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: "URL of the Wix site to scrape (e.g. https://myname.wixsite.com/mysite)"
        required: true
        type: string
      max_pages:
        description: "Max number of pages to crawl"
        required: false
        default: "200"
        type: string
      wait_ms:
        description: "Extra wait (ms) per page for JS to render (increase for slow sites)"
        required: false
        default: "4000"
        type: string

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  scrape:
    name: Crawl & Save Static Site
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: npm install
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true

      - name: Crawl site
        env:
          SITE_URL: ${{ github.event.inputs.site_url || vars.SITE_URL }}
          OUTPUT_DIR: ./static-output
          MAX_PAGES: ${{ github.event.inputs.max_pages || '200' }}
          WAIT_MS: ${{ github.event.inputs.wait_ms || '2000' }}
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
        run: npm run crawl

      # ── Debug: רואים בדיוק מה הורד ──────────────────────────────────────
      - name: Debug output
        if: always()
        env:
          SITE_URL: ${{ github.event.inputs.site_url || vars.SITE_URL }}
        run: |
          echo "=============================="
          echo "SITE_URL = $SITE_URL"
          echo "=============================="
          echo "קבצים שנשמרו:"
          find ./static-output -type f | sort || echo "תיקיית static-output ריקה או לא קיימת"
          echo "=============================="
          echo "האם index.html קיים?"
          ls -la ./static-output/index.html 2>/dev/null || echo "❌ אין index.html בשורש!"
          echo "=============================="
          echo "50 שורות ראשונות של index.html:"
          head -50 ./static-output/index.html 2>/dev/null || echo "אין קובץ"

      - name: Print summary
        if: always()
        run: |
          echo "## 📁 קבצים שהורדו" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find ./static-output -type f | sort 2>/dev/null || echo "אין קבצים" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "**סה״כ:** $(find ./static-output -type f 2>/dev/null | wc -l) קבצים" >> $GITHUB_STEP_SUMMARY

      - name: Upload static site as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-site-${{ github.run_id }}
          path: ./static-output/
          retention-days: 30

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./static-output/

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
