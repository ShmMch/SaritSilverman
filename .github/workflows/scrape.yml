name: Wix Offline Site Builder

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: "URL מלא של האתר (e.g. https://myname.wixsite.com/mysite)"
        required: true
        type: string
      primary_folder:
        description: "שם התיקייה אחרי wixsite.com (e.g. mysite)"
        required: true
        type: string
      wait_seconds:
        description: "שניות המתנה בין דפים (3-6 לאתרים עמוסים)"
        required: false
        default: "4"
        type: string

permissions:
  contents: read

jobs:
  scrape:
    name: Build Offline Site
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python & dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3 python3-pip chromium-browser
          pip3 install selenium requests beautifulsoup4 --break-system-packages

      - name: Download WixScraper
        run: |
          curl -o wixscraper.py https://raw.githubusercontent.com/ryanhlewis/WixScraper/main/wixscraper.py

      - name: Build config.json
        run: |
          SITE="${{ github.event.inputs.site_url }}"
          FOLDER="${{ github.event.inputs.primary_folder }}"
          WAIT="${{ github.event.inputs.wait_seconds }}"
          cat > config.json << CONF
          {
            "site": "$SITE",
            "blockPrimaryFolder": "$FOLDER",
            "wait": $WAIT,
            "recursive": "True",
            "darkWebsite": "False",
            "forceDownloadAgain": "False",
            "metatags": {},
            "mapData": {}
          }
          CONF
          echo "Config:"
          cat config.json

      - name: Run WixScraper
        run: python3 wixscraper.py

      - name: Show results
        if: always()
        run: |
          echo "## קבצים שנשמרו" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find . -not -path './.git/*' -not -name 'wixscraper.py' -not -name 'config.json' -type f | grep -v node_modules | sort >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload ZIP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: offline-site-${{ github.run_id }}
          path: |
            ./${{ github.event.inputs.primary_folder }}/
          retention-days: 30
